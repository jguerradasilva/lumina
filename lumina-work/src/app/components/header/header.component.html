<header class="app-header">
  <div class="header-content">
    <!-- Logo -->
    <div class="logo">
      <span class="logo-icon">🌞</span>
      <span class="logo-text">Lumina</span>
    </div>

    <!-- Controles -->
    <div class="header-controls">
      <!-- Timer Pomodoro -->
      @if (pomodoroEnabled) {
        <button 
          class="control-btn pomodoro-btn" 
          (click)="togglePomodoro()"
          [attr.aria-label]="isPomodoroRunning ? 'Pausar Pomodoro' : 'Iniciar Pomodoro'">
          <span class="pomodoro-icon">🍅</span>
          <span class="pomodoro-time">{{ pomodoroTime }}</span>
          <span class="pomodoro-state">{{ isPomodoroRunning ? '⏸' : '▶' }}</span>
        </button>
      }

      <!-- Modo Foco -->
      <button 
        class="control-btn focus-btn" 
        (click)="toggleFocusMode()"
        [class.active]="focusMode"
        [attr.aria-label]="focusMode ? 'Desativar modo foco' : 'Ativar modo foco'">
        <span class="focus-label">Modo Foco:</span>
        <span class="focus-status" [class.active]="focusMode">
          {{ focusMode ? 'Ativado' : 'Desativado' }}
        </span>
      </button>

      <!-- Settings -->
      <button 
        class="control-btn settings-btn" 
        (click)="openSettings()"
        aria-label="Abrir configurações">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>
</header>
