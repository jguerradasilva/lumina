<header class="app-header">
  <div class="header-content">
    <!-- Logo -->
    <div class="logo">
      <span class="logo-icon">🌞</span>
      <span>Lumina</span>
    </div>

    <!-- Controles -->
    <div class="header-controls">
      <!-- Timer Pomodoro (controlado por configuração) -->
      @if (pomodoroTimerEnabled && pomodoroEnabled) {
        <div class="pomodoro-pill">
          <span class="pomodoro-icon">🍅</span>
          <span class="pomodoro-time">{{ pomodoroTime }}</span>
          <button
            type="button"
            class="pomodoro-toggle"
            (click)="togglePomodoro()"
            [attr.aria-label]="isPomodoroRunning ? 'Pausar timer' : 'Iniciar timer'">
            {{ isPomodoroRunning ? '⏸' : '▶' }}
          </button>
        </div>
      }

      <!-- Modo Foco (controlado por configuração) -->
      @if (focusModeEnabled) {
        <button
          class="control-btn focus-btn"
          (click)="toggleFocusMode()"
          [class.active]="focusMode"
          [attr.aria-label]="focusMode ? 'Desativar modo foco' : 'Ativar modo foco'"
          [disabled]="!canToggleFocus"
          [attr.title]="!canToggleFocus ? 'Ative/expanda ao menos uma lista para usar o modo foco' : ''">
          <span class="focus-label">Modo foco:</span>
          <span class="focus-status" [class.active]="focusMode">
            {{ focusMode ? 'ativado' : 'desativado' }}
          </span>
        </button>
      }

      <!-- Settings -->
      <button
        class="settings-btn"
        (click)="openSettings()"
        aria-label="Abrir configurações">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l1.72-1.34c.15-.12.19-.34.09-.51l-1.64-2.84c-.1-.17-.33-.23-.51-.12l-2.03 1.59c-.42-.33-.88-.63-1.38-.87l-.3-2.34c-.04-.2-.23-.35-.44-.35h-3.28c-.2 0-.39.15-.43.35l-.3 2.34c-.5.24-.96.54-1.38.87l-2.03-1.59c-.18-.14-.4-.08-.51.12l-1.64 2.84c-.1.17-.06.39.09.51l1.72 1.34c-.05.3-.07.62-.07.94 0 .33.02.64.07.94l-1.72 1.34c-.15.12-.19.34-.09.51l1.64 2.84c.1.17.33.23.51.12l2.03-1.59c.42.33.88.63 1.38.87l.3 2.34c.05.2.23.35.44.35h3.28c.2 0 .39-.15.43-.35l.3-2.34c.5-.24.96-.54 1.38-.87l2.03 1.59c.18.14.4.08.51-.12l1.64-2.84c.1-.17.06-.39-.09-.51l-1.72-1.34zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
        </svg>
      </button>
    </div>
  </div>
</header>
